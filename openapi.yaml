openapi: 3.0.3
info:
  title: AI Quizzes API
  version: 1.0.0

servers:
  - url: http://localhost:8080

paths:
  /user:
    post:
      summary: Создать пользователя
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              username: ivan
              password: secret123
              role: mentor
      responses:
        '201':
          description: Пользователь создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          description: Некорректный JSON
        '500':
          description: Внутренняя ошибка сервера

  /user/{userId}/quizzes:
    get:
      summary: Получить квизы пользователя (назначенные)
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          description: ID пользователя
      responses:
        '200':
          description: Список квизов пользователя
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/QuizResponse'
        '400':
          description: Некорректный ID пользователя
        '500':
          description: Внутренняя ошибка сервера

  /user/{userId}/quizzes/created:
    get:
      summary: Получить квизы, созданные ментором
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          description: ID пользователя с ролью mentor
      responses:
        '200':
          description: Список квизов, созданных данным ментором
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/QuizResponse'
        '400':
          description: Некорректный ID пользователя
        '500':
          description: Внутренняя ошибка сервера

  /user/{userId}/quizzes/assigned:
    get:
      summary: Получить квизы, назначенные студенту
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          description: ID пользователя с ролью student
      responses:
        '200':
          description: Список квизов, назначенных данному студенту
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/QuizResponse'
        '400':
          description: Некорректный ID пользователя
        '500':
          description: Внутренняя ошибка сервера

  /quiz:
    get:
      summary: Получить все квизы
      tags:
        - Quizzes
      responses:
        '200':
          description: Список всех квизов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/QuizResponse'
        '500':
          description: Внутренняя ошибка сервера

    post:
      summary: Создать квиз
      description: Создать квиз может только пользователь с ролью mentor.
      tags:
        - Quizzes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateQuizRequest'
            example:
              title: Основы Go
              creator_id: 1
              questions:
                - text: Что такое горутина в Go?
                  correct_answer_number: 2
                  options:
                    - text: Тип данных
                      number: 1
                    - text: Легковесный поток выполнения
                      number: 2
                    - text: Интерфейс
                      number: 3
                    - text: Пакет стандартной библиотеки
                      number: 4
      responses:
        '201':
          description: Квиз создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuizResponse'
        '400':
          description: Некорректный JSON
        '500':
          description: >
            Внутренняя ошибка сервера.
            Возможные причины: пользователь не найден, пользователь не является ментором.

  /quiz/generate:
    post:
      summary: Сгенерировать квиз с помощью AI и сохранить его
      description: >
        Генерирует вопросы по заданной теме с помощью OpenAI и сохраняет квиз в базе данных.
        Каждый вопрос содержит ровно 4 варианта ответа на русском языке.
      tags:
        - Quizzes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateQuestionsRequest'
            example:
              title: Квиз по основам Go
              creator_id: 1
              topic: Основы Go
              count: 3
      responses:
        '201':
          description: Квиз сгенерирован и сохранён
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuizResponse'
        '400':
          description: Некорректный JSON, не указана тема или заголовок
        '500':
          description: Ошибка обращения к AI, разбора ответа или сохранения в БД

  /quiz/{quizId}:
    get:
      summary: Получить квиз по ID
      tags:
        - Quizzes
      parameters:
        - name: quizId
          in: path
          required: true
          schema:
            type: integer
          description: ID квиза
      responses:
        '200':
          description: Квиз найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuizResponse'
        '400':
          description: Некорректный ID квиза
        '500':
          description: Внутренняя ошибка сервера

  /assignment:
    post:
      summary: Назначить квиз студенту
      description: >
        Назначить квиз студенту может только пользователь с ролью mentor.
        Квиз может быть назначен только пользователю с ролью student.
      tags:
        - Assignments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAssignmentRequest'
            example:
              quiz_id: 1
              student_id: 2
              mentor_id: 1
      responses:
        '201':
          description: Назначение создано
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentResponse'
        '400':
          description: Некорректный JSON
        '500':
          description: >
            Внутренняя ошибка сервера.
            Возможные причины: пользователь не найден, mentor_id не является ментором,
            student_id не является студентом.

  /assignment/{id}:
    get:
      summary: Получить назначение по ID
      tags:
        - Assignments
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: ID назначения
      responses:
        '200':
          description: Назначение найдено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentResponse'
        '400':
          description: Некорректный ID назначения
        '500':
          description: Внутренняя ошибка сервера

  /user/{userId}/assignments:
    get:
      summary: Получить назначения студента
      tags:
        - Assignments
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
          description: ID пользователя с ролью student
      responses:
        '200':
          description: Список назначений студента
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AssignmentResponse'
        '400':
          description: Некорректный ID пользователя
        '500':
          description: Внутренняя ошибка сервера

  /attempt:
    post:
      summary: Создать попытку выполнения квиза
      description: >
        Принимает ID назначения и ответы студента на вопросы квиза.
        Возвращает попытку с результатом, списком правильно и неправильно
        отвеченных вопросов, а также итоговым баллом (0–100).
      tags:
        - Attempts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAttemptRequest'
            example:
              assignment_id: 1
              answers:
                - question_id: 1
                  answer_number: 2
                - question_id: 2
                  answer_number: 1
      responses:
        '201':
          description: Попытка создана
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttemptResponse'
        '400':
          description: Некорректный JSON
        '500':
          description: >
            Внутренняя ошибка сервера.
            Возможные причины: назначение не найдено, квиз не найден, пользователь не найден.

components:
  schemas:
    RegisterRequest:
      type: object
      required:
        - username
        - password
        - role
      properties:
        username:
          type: string
          example: ivan
        password:
          type: string
          example: secret123
        role:
          type: string
          enum:
            - student
            - mentor
          example: mentor

    UserResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: ivan
        role:
          type: string
          enum:
            - student
            - mentor
          example: mentor

    AnswerOptionRequest:
      type: object
      required:
        - text
        - number
      properties:
        text:
          type: string
          example: Легковесный поток выполнения
        number:
          type: integer
          description: Порядковый номер варианта ответа в вопросе
          example: 2

    QuestionRequest:
      type: object
      required:
        - text
        - correct_answer_number
        - options
      properties:
        text:
          type: string
          example: Что такое горутина в Go?
        correct_answer_number:
          type: integer
          description: Номер правильного варианта ответа
          example: 2
        options:
          type: array
          items:
            $ref: '#/components/schemas/AnswerOptionRequest'
          minItems: 2

    CreateQuizRequest:
      type: object
      required:
        - title
        - creator_id
        - questions
      properties:
        title:
          type: string
          example: Основы Go
        creator_id:
          type: integer
          description: ID пользователя с ролью mentor
          example: 1
        questions:
          type: array
          items:
            $ref: '#/components/schemas/QuestionRequest'
          minItems: 1

    GenerateQuestionsRequest:
      type: object
      required:
        - title
        - creator_id
        - topic
      properties:
        title:
          type: string
          description: Название квиза
          example: Квиз по основам Go
        creator_id:
          type: integer
          description: ID пользователя с ролью mentor
          example: 1
        topic:
          type: string
          description: Тема, по которой нужно сгенерировать вопросы
          example: Основы Go
        count:
          type: integer
          description: Количество вопросов (по умолчанию 5)
          example: 3
          default: 5

    CreateAssignmentRequest:
      type: object
      required:
        - quiz_id
        - student_id
        - mentor_id
      properties:
        quiz_id:
          type: integer
          description: ID квиза
          example: 1
        student_id:
          type: integer
          description: ID пользователя с ролью student
          example: 2
        mentor_id:
          type: integer
          description: ID пользователя с ролью mentor
          example: 1

    AssignmentResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        quiz_id:
          type: integer
          example: 1
        student_id:
          type: integer
          example: 2

    AnswerOptionResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        question_id:
          type: integer
          example: 1
        text:
          type: string
          example: Легковесный поток выполнения
        number:
          type: integer
          example: 2

    QuestionResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        quiz_id:
          type: integer
          example: 1
        text:
          type: string
          example: Что такое горутина в Go?
        correct_answer_number:
          type: integer
          example: 2
        options:
          type: array
          items:
            $ref: '#/components/schemas/AnswerOptionResponse'

    QuizResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Основы Go
        creator_id:
          type: integer
          example: 1
        questions:
          type: array
          items:
            $ref: '#/components/schemas/QuestionResponse'

    UserAnswerRequest:
      type: object
      required:
        - question_id
        - answer_number
      properties:
        question_id:
          type: integer
          description: ID вопроса
          example: 1
        answer_number:
          type: integer
          description: Номер варианта ответа, выбранного студентом
          example: 2

    CreateAttemptRequest:
      type: object
      required:
        - assignment_id
        - answers
      properties:
        assignment_id:
          type: integer
          description: ID назначения
          example: 1
        answers:
          type: array
          items:
            $ref: '#/components/schemas/UserAnswerRequest'

    AttemptUserResponse:
      type: object
      properties:
        id:
          type: integer
          example: 2
        nickname:
          type: string
          example: ivan

    AttemptQuizResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: Основы Go

    AttemptResponse:
      type: object
      properties:
        id:
          type: integer
          example: 1
        user:
          $ref: '#/components/schemas/AttemptUserResponse'
        quiz:
          $ref: '#/components/schemas/AttemptQuizResponse'
        score:
          type: number
          format: float
          description: Результат в процентах (0–100)
          example: 75.0
        correct_question_ids:
          type: array
          items:
            type: integer
          description: ID вопросов, на которые был дан правильный ответ
          example: [1, 3]
        wrong_question_ids:
          type: array
          items:
            type: integer
          description: ID вопросов, на которые был дан неправильный ответ
          example: [2]
